services:
  gh-copilot:
    image: gh-copilot
    build:
      context: .
      network: host
      dockerfile: Dockerfile
    working_dir: /workdir
    volumes:
      - .:/workdir
      - ${HOME}/.gitconfig:/home/${USER}/.gitconfig
      - ${HOME}/.copilot:/home/${USER}/.copilot
      - ${HOME}/.config/gh:/home/${USER}/.config/gh
    tty: true
    stdin_open: true
    environment:
      - TERM=xterm-256color
      - USER=${USER}
      - HOME=/home/${USER}
      - XDG_CONFIG_HOME=/home/${USER}/.config
